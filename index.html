<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Austrian Currents</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: #0a0a0f; }
      #map { width: 100vw; height: 100vh; }

      /* Plant popup */
      .plant-popup .maplibregl-popup-content {
        background: #14141f;
        border: 1px solid #2a2a45;
        border-radius: 8px;
        padding: 12px 14px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.65);
        font-family: system-ui, sans-serif;
      }
      .plant-popup .maplibregl-popup-close-button {
        color: #555;
        font-size: 18px;
        padding: 4px 8px;
        line-height: 1;
        background: none;
      }
      .plant-popup .maplibregl-popup-close-button:hover { color: #aaa; }
      .plant-popup .maplibregl-popup-tip { border-top-color: #14141f; }
      .plant-popup.maplibregl-popup-anchor-top .maplibregl-popup-tip { border-bottom-color: #14141f; }
      .plant-popup.maplibregl-popup-anchor-left .maplibregl-popup-tip { border-right-color: #14141f; }
      .plant-popup.maplibregl-popup-anchor-right .maplibregl-popup-tip { border-left-color: #14141f; }

      .pp-name { font-size: 13px; font-weight: 600; color: #dde; margin-bottom: 8px; line-height: 1.3; }
      .pp-badge {
        display: inline-block;
        font-size: 10px; font-weight: 700;
        color: #0a0a0f;
        padding: 2px 8px;
        border-radius: 4px;
        margin-bottom: 8px;
        letter-spacing: 0.03em;
      }
      .pp-cap { font-size: 13px; color: #8899aa; margin-bottom: 3px; }
      .pp-meta { font-size: 11px; color: #556; margin-top: 2px; }

      /* Cluster popup extras */
      .pp-plant-list {
        margin-top: 8px;
        border-top: 1px solid #22223a;
        padding-top: 6px;
      }
      .pp-plant-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 11px;
        color: #99aabb;
        padding: 2px 0;
      }
      .pp-plant-cap { font-size: 10px; color: #556; margin-left: 8px; white-space: nowrap; }
      .pp-more { margin-top: 4px; }

      /* Controls panel */
      #controls {
        position: absolute;
        bottom: 30px;
        left: 10px;
        background: rgba(12, 12, 20, 0.90);
        border: 1px solid #2a2a45;
        border-radius: 8px;
        padding: 12px 14px;
        font-family: system-ui, sans-serif;
        z-index: 1;
        min-width: 195px;
        backdrop-filter: blur(4px);
      }
      .ctrl-row + .ctrl-row { margin-top: 10px; }
      .ctrl-label {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: #6677aa;
        margin-bottom: 4px;
      }
      .ctrl-label-val { color: #ccd; font-variant-numeric: tabular-nums; }
      input[type=range] {
        display: block;
        width: 100%;
        accent-color: #4fc3f7;
        cursor: pointer;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div id="controls">
      <div class="ctrl-row">
        <div class="ctrl-label">
          <span>Merge radius</span>
          <span class="ctrl-label-val" id="radius-val">20 km</span>
        </div>
        <input type="range" id="radius-slider" min="0" max="100" value="20" step="1">
      </div>
      <div class="ctrl-row">
        <div class="ctrl-label">
          <span>Min capacity</span>
          <span class="ctrl-label-val" id="mincap-val">0 MW</span>
        </div>
        <input type="range" id="mincap-slider" min="0" max="500" value="0" step="5">
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
