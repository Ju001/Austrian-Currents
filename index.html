<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Austrian Currents</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: #0a0a0f; }
      #map { width: 100vw; height: 100vh; }

      /* Legend */
      #legend {
        position: absolute;
        bottom: 28px;
        left: 12px;
        background: rgba(8, 8, 14, 0.82);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        padding: 10px 13px;
        font-family: system-ui, sans-serif;
        z-index: 1;
        min-width: 160px;
        backdrop-filter: blur(6px);
      }
      .leg-row {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 3px 0;
      }
      .leg-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        box-shadow: 0 0 5px currentColor;
      }
      .leg-label {
        font-size: 11px;
        color: #99aacc;
        flex: 1;
      }
      .leg-pct {
        font-size: 11px;
        color: #ccd;
        font-variant-numeric: tabular-nums;
      }

      /* Mix controls */
      #mix-controls {
        position: absolute;
        top: 16px;
        right: 12px;
        background: rgba(8, 8, 14, 0.85);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        padding: 10px 14px;
        font-family: system-ui, sans-serif;
        z-index: 1;
        min-width: 180px;
        max-width: calc(100vw - 24px);
        backdrop-filter: blur(6px);
      }
      #mix-controls h3 {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.35);
        margin: 0 0 7px;
      }
      .ctrl-row {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 2px 0;
      }
      .ctrl-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .ctrl-label {
        font-size: 11px;
        color: #99aacc;
        width: 88px;
        flex-shrink: 0;
      }
      .ctrl-slider {
        flex: 1;
        accent-color: #6699ff;
        cursor: pointer;
        height: 3px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="legend"></div>
    <div id="mix-controls"><h3>Mix</h3></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
